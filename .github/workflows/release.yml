name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --continue

      - name: Run lint
        run: ./gradlew lintRelease

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/test-results/test/*.xml"

  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: test-gate
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version bump
        id: bump
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CURRENT=$(grep 'versionName' app/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          if echo "$FIRST_LINE" | grep -qE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT -> $NEW ($BUMP)"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in build.gradle.kts
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new }}
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NEW_VERSION"
          NEW_VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionName = \"[0-9]*\.[0-9]*\.[0-9]*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
          echo "Updated versionName=$NEW_VERSION versionCode=$NEW_VERSION_CODE"

      - name: Update CHANGELOG
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          DATE=$(date +%Y-%m-%d)
          if echo "$FIRST_LINE" | grep -qE "^feat"; then
            SECTION="Features"
            ENTRY=$(echo "$FIRST_LINE" | sed 's/^feat[^:]*: //')
          elif echo "$FIRST_LINE" | grep -qE "^fix"; then
            SECTION="Fixes"
            ENTRY=$(echo "$FIRST_LINE" | sed 's/^fix[^:]*: //')
          else
            SECTION="Changes"
            ENTRY=$(echo "$FIRST_LINE" | sed 's/^[a-z]*[^:]*: //')
          fi
          if [ -f CHANGELOG.md ]; then
            sed -i "/^# Changelog/a\\\\n## [$NEW_VERSION] - $DATE\\n\\n### $SECTION\\n- $ENTRY\\n\\n---" CHANGELOG.md
          fi

      - name: Decode signing keystore
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=$(pwd)/keystore.jks" >> "$GITHUB_ENV"
          else
            echo "No keystore configured, building unsigned"
          fi

      - name: Build APK and AAB
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease

      - name: Commit version bump
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          NEW_VERSION: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add app/build.gradle.kts CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: "GateControl Android ${{ steps.bump.outputs.tag }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
