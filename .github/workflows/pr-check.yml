name: PR Check

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --continue

      - name: Run lint
        run: ./gradlew lintRelease

      - name: Check for unguarded HTTP body logging
        run: |
          if grep -rn 'Level\.BODY' --include='*.kt' --include='*.java' . | grep -v 'isDebuggable\|BuildConfig\.DEBUG\|FLAG_DEBUGGABLE' | grep -v '\.gradle'; then
            echo "::error::Found unguarded Level.BODY HTTP logging. Wrap with a debug-only check to prevent credential leaks in release builds."
            exit 1
          fi

      - name: Build debug APK (build check)
        run: ./gradlew assembleDebug

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: PR Unit Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
