name: PR Check

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test --continue

      - name: Run lint
        run: ./gradlew lintRelease

      - name: Check for unguarded HTTP body logging
        run: |
          if grep -rn 'Level\.BODY' --include='*.kt' --include='*.java' . | grep -v 'isDebuggable\|BuildConfig\.DEBUG\|FLAG_DEBUGGABLE' | grep -v '\.gradle'; then
            echo "::error::Found unguarded Level.BODY HTTP logging. Wrap with a debug-only check to prevent credential leaks in release builds."
            exit 1
          fi

      - name: Check for credential leaks in logs
        run: |
          if grep -rn 'Timber\.\(d\|i\|w\|e\).*\(password\|Password\|PASSWORD\|secret\|credential\)' \
            --include='*.kt' --include='*.java' . \
            | grep -v 'Test\|test\|\.gradle'; then
            echo "::error::Found potential credential logging. Never log passwords or secrets."
            exit 1
          fi

      - name: Check FLAG_SECURE on RDP Activity
        run: |
          if grep -rn 'class RdpSessionActivity' --include='*.kt' -l .; then
            if ! grep -n 'FLAG_SECURE' app/src/main/java/com/gatecontrol/android/rdp/RdpSessionActivity.kt; then
              echo "::error::RdpSessionActivity must set FLAG_SECURE to prevent screenshots"
              exit 1
            fi
          fi

      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      - name: Build debug APK (build check)
        run: ./gradlew assembleDebug

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: PR Unit Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
